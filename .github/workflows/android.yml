# GitHub Actions workflow compiling, testing, linting, and packaging FinFly.
name: Android CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Make wrapper executable
        run: chmod +x gradlew

      - name: Unit tests, lint, and debug APK
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: finfly-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: finfly-verification-reports
          path: |
            app/build/reports/tests/
            app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
